#loginScreen{position:fixed;inset:0;background:#0C2340;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .35s}
#loginScreen.hide{opacity:0;pointer-events:none}
.login-box{width:320px;text-align:center}
.login-logo{font-size:12px;color:rgba(255,255,255,.35);letter-spacing:.15em;margin-bottom:8px}
.login-title{font-size:23px;font-weight:700;color:#fff;line-height:1.4;margin-bottom:4px}
.login-sub{font-size:13px;color:rgba(255,255,255,.35);margin-bottom:36px}
.login-label{font-size:12px;color:rgba(255,255,255,.45);text-align:left;margin-bottom:6px;display:block}
.login-input{width:100%;padding:12px 14px;border-radius:10px;border:1.5px solid rgba(255,255,255,.12);background:rgba(255,255,255,.07);color:#fff;font-size:16px;font-family:inherit;letter-spacing:.2em;outline:none;transition:border .15s;text-align:center}
.login-input:focus{border-color:rgba(255,255,255,.4)}
.login-input.err{border-color:#E24B4A;animation:shake .35s}
.login-btn{width:100%;margin-top:14px;padding:12px;border-radius:10px;border:none;background:#185FA5;color:#fff;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s}
.login-btn:hover{background:#1D75CC}
.login-err{font-size:13px;color:#E24B4A;margin-top:10px;min-height:18px}
.login-ver{font-size:11px;color:rgba(255,255,255,.18);margin-top:40px}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

/* ── 비밀번호 변경 모달 ── */

#pwModal.on{opacity:1;pointer-events:auto}
.pw-box{background:#fff;border-radius:16px;padding:24px;width:300px;box-shadow:0 12px 40px rgba(0,0,0,.2)}
.pw-box h3{font-size:15px;font-weight:700;margin-bottom:18px;color:#111}
.pw-field{margin-bottom:12px}
.pw-field label{font-size:12px;color:#888;display:block;margin-bottom:5px}
.pw-field input{width:100%;padding:9px 12px;border:1.5px solid #DDD;border-radius:8px;font-size:14px;font-family:inherit;outline:none;transition:border .15s}
.pw-field input:focus{border-color:#185FA5}
.pw-field input.err{border-color:#E24B4A}
.pw-actions{display:flex;gap:8px;margin-top:18px}
.pw-actions button{flex:1;padding:9px;border-radius:8px;border:none;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.pw-cancel{background:#F5F5F5;color:#666}
.pw-confirm{background:#0C2340;color:#fff}
.pw-confirm:hover{background:#185FA5}
.pw-msg{font-size:12px;margin-top:8px;min-height:16px}
</style>
</head>
<body>
<!-- 로그인 화면 -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">FINE CYBER</div>

    <div class="pw-field"><label>현재 비밀번호</label><input type="password" id="pwCur" placeholder="현재 비밀번호 입력"></div>

<script>
// ── 비밀번호 / 로그인 ──
const DEFAULT_PW='1234';
function getPw(){return localStorage.getItem('fc_pw')||DEFAULT_PW;}
function doLogin(){
  const input=document.getElementById('loginPw');
  const err=document.getElementById('loginErr');
  if(input.value===getPw()){
    document.getElementById('loginScreen').classList.add('hide');
    setTimeout(()=>{document.getElementById('loginScreen').style.display='none';},400);
    err.textContent='';
  }else{
    input.classList.add('err');
    err.textContent='비밀번호가 올바르지 않습니다.';
    input.value='';
    setTimeout(()=>input.classList.remove('err'),400);
    input.focus();
  }
}
function openPwModal(){
  document.getElementById('pwCur').value='';
  document.getElementById('pwNew').value='';
  document.getElementById('pwNew2').value='';
  document.getElementById('pwMsg').textContent='';
  document.getElementById('pwMsg').style.color='';
  ['pwCur','pwNew','pwNew2'].forEach(id=>document.getElementById(id).classList.remove('err'));
  document.getElementById('pwModal').classList.add('on');
  setTimeout(()=>document.getElementById('pwCur').focus(),100);
}
function closePwModal(){document.getElementById('pwModal').classList.remove('on');}
function changePw(){
  const cur=document.getElementById('pwCur').value;
  const nw=document.getElementById('pwNew').value;
  const nw2=document.getElementById('pwNew2').value;
  const msg=document.getElementById('pwMsg');
  ['pwCur','pwNew','pwNew2'].forEach(id=>document.getElementById(id).classList.remove('err'));
  if(cur!==getPw()){document.getElementById('pwCur').classList.add('err');msg.style.color='#E24B4A';msg.textContent='현재 비밀번호가 올바르지 않습니다.';return;}
  if(nw.length<4){document.getElementById('pwNew').classList.add('err');msg.style.color='#E24B4A';msg.textContent='새 비밀번호는 4자리 이상이어야 합니다.';return;}
  if(nw!==nw2){document.getElementById('pwNew2').classList.add('err');msg.style.color='#E24B4A';msg.textContent='새 비밀번호가 일치하지 않습니다.';return;}
  localStorage.setItem('fc_pw',nw);
  msg.style.color='#3B6D11';msg.textContent='✓ 비밀번호가 변경되었습니다.';
  setTimeout(()=>closePwModal(),1200);
}
document.getElementById('pwModal').addEventListener('click',function(e){if(e.target===this)closePwModal();});

const TODAY=new Date();
const YR=TODAY.getFullYear();
const MOS=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
const BIZ=[
  {id:'self',name:'자체교육원',unit:190960,type:'self',color:'#185FA5'},
  {id:'refund',name:'사업주 환급과정',unit:190960,type:'self',color:'#1D9E75'},
  {id:'legal',name:'법정의무교육',unit:5000,type:'legal',color:'#854F0B'},
  {id:'guard',name:'경비직무교육',unit:1000,type:'guard',color:'#639922'},
];
const SDATA={
  self:[

  if(t==='legal')return 5000;

}

function odw(name){
  dwCo=name;
  const biz=BIZ[curBiz],cos=getCos(),co=cos.find(c=>c.name===name);if(!co)return;
  if(biz.type==='self'||biz.type==='refund'){const bats=BAT(co.l),aB=bats.find(b=>new Date(b.st)<=TODAY&&TODAY<=new Date(b.en));dwBk=aB?aB.k:bats[0]?.k;rBS(bats);}else{document.getElementById('dwbat').innerHTML='';dwBk=null;}
  document.getElementById('dwtit').innerHTML=name+' '+SB(biz.type==='guard'?'active':CST(co.l));
  rPil(co);rSum(co);rDwTabs(biz);rDwBd(co);
  document.getElementById('dw').classList.add('on');document.getElementById('ov').classList.add('on');
  document.querySelectorAll('.cc').forEach(el=>el.classList.toggle('sel',(el.getAttribute('onclick')||'').includes(`'${name}'`)));
}
function cldw(){document.getElementById('dw').classList.remove('on');document.getElementById('ov').classList.remove('on');document.querySelectorAll('.cc').forEach(el=>el.classList.remove('sel'));dwCo=null;}
function rBS(bats){document.getElementById('dwbat').innerHTML=`<span style="font-size:12px;color:#888;flex-shrink:0">기수 선택</span>`+bats.map((b,i)=>{const ia=new Date(b.st)<=TODAY&&TODAY<=new Date(b.en);return`<button class="bbt ${b.k===dwBk?'on':''}" onclick="sBat('${b.k}')">${BL(b,i,bats.length)}${ia?' ●':''}</button>`;}).join('');}
function sBat(k){dwBk=k;const cos=getCos(),co=cos.find(c=>c.name===dwCo);if(!co)return;rBS(BAT(co.l));rPil(co);rSum(co);rDwBd(co);}
function gCL(co){if(!dwBk)return co.l;return(BAT(co.l).find(x=>x.k===dwBk)||{l:[]}).l;}

function rPil(co){
  const biz=BIZ[curBiz],ls=gCL(co),tot=ls.reduce((s,r)=>s+calcFee(r,biz.type),0);
  const allStP=co.l.map(r=>r.st).filter(Boolean).sort();
  const firstStP=allStP[0]||'';
  const activeStP=co.l.find(r=>isOn(r))?.st||'';
  const openInfo=activeStP?`개강 ${activeStP.slice(0,10)} (수강중)`:firstStP?`최근 개강 ${firstStP.slice(0,10)}`:'';
  document.getElementById('dwmet').textContent=`${openInfo}${openInfo?' · ':''}수강생 ${ls.length}명 · 예상 수수료 ${W(tot)}`;
  if(biz.type==='self'||biz.type==='refund'){
    const f1=ls.filter(r=>r.pr>=80&&(r.sc||0)>=60).length,f8=ls.filter(r=>(r.pr>=50&&r.pr<80)||(r.pr>=80&&(r.sc||0)<60)).length,f0=ls.filter(r=>r.pr<50).length;
    const ep=ls.filter(r=>(r.sc||0)>=60).length,et=ls.filter(r=>(r.sc||0)>0).length;
    document.getElementById('dwpil').innerHTML=`<span class="pil" style="background:#EAF3DE;color:#3B6D11">100% ${f1}명</span><span class="pil" style="background:#FAEEDA;color:#633806">80% ${f8}명</span><span class="pil" style="background:#FCEBEB;color:#791F1F">미지급 ${f0}명</span><span class="pil" style="background:#E6F1FB;color:#0C447C">${W(tot)}</span><span class="pil" style="background:#F3EBFF;color:#5B21B6">평가 60점↑ ${ep}명 / ${et}명</span>`;
  }
  else if(biz.type==='legal'){const done=ls.filter(r=>r.pr>=100).length,ep2=ls.filter(r=>(r.sc||0)>=60).length,et2=ls.filter(r=>(r.sc||0)>0).length;document.getElementById('dwpil').innerHTML=`<span class="pil" style="background:#EAF3DE;color:#3B6D11">완료 ${done}명</span><span class="pil" style="background:#FAEEDA;color:#633806">미완료 ${ls.length-done}명</span><span class="pil" style="background:#E6F1FB;color:#0C447C">${W(tot)}</span><span class="pil" style="background:#F3EBFF;color:#5B21B6">평가 60점↑ ${ep2}명 / ${et2}명</span>`;}
  else{const ts=ls.reduce((s,r)=>s+(r.sessions||[]).filter(x=>x===1).length,0);document.getElementById('dwpil').innerHTML=`<span class="pil" style="background:#EAF3DE;color:#3B6D11">누적 ${ts}회 출석</span><span class="pil" style="background:#E6F1FB;color:#0C447C">${W(tot)}</span>`;}
}

    const curM=TODAY.getMonth();
    const sessSum=Array(12).fill(0).map((_,mi)=>ls.filter(r=>(r.sessions||[])[mi]===1).length);
    document.getElementById('dwsum').innerHTML=`<div class="sugg"><div class="sugc"><div class="sugv" style="color:#639922">${ls.length}</div><div class="sugl">관리 인원</div></div><div class="sugc"><div class="sugv" style="color:#185FA5">${ls.reduce((s,r)=>s+(r.sessions||[]).filter(x=>x===1).length,0)}</div><div class="sugl">누적 출석</div></div><div class="sugc"><div class="sugv" style="color:#854F0B">${ls.reduce((s,r)=>s+(r.sessions||[]).slice(0,curM+1).filter(x=>x===0).length,0)}</div><div class="sugl">누적 결석</div></div><div class="sugc"><div class="sugv" style="color:#185FA5;font-size:14px">${W(ls.reduce((s,r)=>s+calcFee(r,'guard'),0))}</div><div class="sugl">수수료</div></div></div>
    <div style="font-size:11px;color:#888;font-weight:600;margin-bottom:6px">월별 출석 현황</div>
    <div style="display:flex;gap:4px;align-items:flex-end">${MOS.map((m,i)=>`<div style="flex:1;text-align:center"><div style="height:28px;background:#F5F5F5;border-radius:4px;overflow:hidden;display:flex;align-items:flex-end"><div style="width:100%;height:${ls.length?Math.round(sessSum[i]/ls.length*100):0}%;background:${i<=curM?'#639922':'#DDD'};min-height:${sessSum[i]>0?3:0}px"></div></div><div style="font-size:10px;color:#AAA;margin-top:3px">${m}</div><div style="font-size:11px;font-weight:600;color:${i<=curM?'#639922':'#CCC'}">${sessSum[i]}</div></div>`).join('')}</div>
    <div style="font-size:11px;color:#AAA;margin-top:7px;padding:6px 9px;background:#F5F5F5;border-radius:6px"><i class="ti ti-info-circle" style="margin-right:4px"></i>출석 기준 과금 · 1,000원/인·회 × 연 12회</div>`;
  }
}

function rDwTabs(biz){
  if(biz.type==='self'||biz.type==='refund'){document.getElementById('dwTabRow').innerHTML=`<button class="tab on" onclick="stb('learners',this)"><i class="ti ti-users"></i> 수강생</button><button class="tab" onclick="stb('fee',this)"><i class="ti ti-coin"></i> 수수료</button><button class="tab" onclick="stb('schedule',this)"><i class="ti ti-calendar"></i> 개강 일정</button>`;dwTab='learners';}
  else if(biz.type==='legal'){document.getElementById('dwTabRow').innerHTML=`<button class="tab on" onclick="stb('learners',this)"><i class="ti ti-users"></i> 수강생</button><button class="tab" onclick="stb('fee',this)"><i class="ti ti-coin"></i> 수수료</button>`;dwTab='learners';}
  else{document.getElementById('dwTabRow').innerHTML=`<button class="tab on" onclick="stb('attendance',this)"><i class="ti ti-calendar-check"></i> 출석 현황</button><button class="tab" onclick="stb('fee',this)"><i class="ti ti-coin"></i> 수수료</button>`;dwTab='attendance';}
}
function stb(tab,el){dwTab=tab;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));el.classList.add('on');const cos=getCos(),co=cos.find(c=>c.name===dwCo);if(co)rDwBd(co);}

function rDwBd(co){
  const biz=BIZ[curBiz],ls=gCL(co);let h='';
  if(dwTab==='learners'){
    h=`<table><thead><tr><th style="width:20%">수강생</th><th style="width:25%">진도율</th><th style="width:12%">평가</th><th style="width:16%">마지막접속</th><th style="width:10%">D-day</th><th style="width:17%">상태</th></tr></thead><tbody>`+
    [...ls].sort((a,b)=>a.pr-b.pr).map(r=>{const ft=feeLabel(r,biz.type);return`<tr><td><b>${r.nm}</b></td><td><span class="pb"><span class="pf" style="width:${r.pr}%;background:${pc(r.pr)}"></span></span> <b style="color:${pc(r.pr)}">${r.pr}%</b></td><td style="color:${(r.sc||0)>=60?'#3B6D11':(r.sc||0)>0?'#A32D2D':'#CCC'}">${(r.sc||0)>0?r.sc+'점':'미응시'}</td><td style="color:#888">${r.ll}</td><td style="font-size:12px">${r.en?DD(r.en):'-'}</td><td><span class="bdg ${ft.c}">${ft.l}</span></td></tr>`;}).join('')+`</tbody></table>`;
  } else if(dwTab==='fee'){
    const tot=ls.reduce((s,r)=>s+calcFee(r,biz.type),0);
    h=`<div style="padding:9px 13px;background:#FAFAFA;border-bottom:1px solid #EBEBEB;font-size:12px;color:#888">${biz.type==='legal'?`개강 기준 · ${W(biz.unit)}/인·회`:biz.type==='guard'?`출석 기준 · ${W(biz.unit)}/인·회`:`단가 ${W(biz.unit)}/인`} · 합계 <b style="color:#185FA5">${W(tot)}</b></div>
    <table><thead><tr><th style="width:25%">수강생</th>${biz.type==='guard'?'<th>출석 회차</th><th>수수료</th>':'<th style="width:22%">진도율</th><th>평가</th><th>수수료</th><th>유형</th>'}</tr></thead><tbody>`+
    ls.map(r=>{const f=calcFee(r,biz.type),ft=feeLabel(r,biz.type);
      if(biz.type==='guard'){const cnt=(r.sessions||[]).filter(x=>x===1).length;return`<tr><td><b>${r.nm}</b></td><td style="color:#888">${cnt}회 / 12회</td><td style="font-weight:600;color:#185FA5">${W(f)}</td></tr>`;}
      return`<tr><td><b>${r.nm}</b></td><td><span class="pb"><span class="pf" style="width:${r.pr}%;background:${pc(r.pr)}"></span></span> <b style="color:${pc(r.pr)}">${r.pr}%</b></td><td style="color:${(r.sc||0)>=60?'#3B6D11':(r.sc||0)>0?'#A32D2D':'#CCC'}">${(r.sc||0)>0?r.sc+'점':'미응시'}</td><td style="font-weight:600;color:#185FA5">${W(f)}</td><td><span class="bdg ${ft.c}">${ft.l}</span></td></tr>`;}).join('')+
    `</tbody><tfoot><tr><td colspan="${biz.type==='guard'?2:4}">합계</td><td style="color:#185FA5">${W(tot)}</td>${biz.type==='guard'?'':'<td></td>'}</tr></tfoot></table>`;
  } else if(dwTab==='attendance'){
    h=`<div style="overflow-x:auto"><table><thead><tr><th style="min-width:90px">수강생</th>${MOS.map(m=>`<th style="width:50px;text-align:center">${m}</th>`).join('')}<th style="text-align:center">합계</th></tr></thead><tbody>`+
    ls.map(r=>{const cnt=(r.sessions||[]).filter(x=>x===1).length;return`<tr><td><b>${r.nm}</b></td>${(r.sessions||Array(12).fill(0)).map((s,i)=>`<td style="text-align:center;color:${s===1?'#3B6D11':i<=TODAY.getMonth()?'#CCC':'#EEE'};font-size:17px">${s===1?'●':'○'}</td>`).join('')}<td style="text-align:center;font-weight:600;color:#639922">${cnt}회</td></tr>`;}).join('')+
    `</tbody><tfoot><tr><td>합계</td>${Array(12).fill(0).map((_,mi)=>`<td style="text-align:center;color:#639922;font-weight:600">${ls.filter(r=>(r.sessions||[])[mi]===1).length}</td>`).join('')}<td style="text-align:center;font-weight:600;color:#639922">${ls.reduce((s,r)=>s+(r.sessions||[]).filter(x=>x===1).length,0)}</td></tr></tfoot></table></div>`;
  } else if(dwTab==='schedule'){
    const bats=BAT(co.l);const ys=new Date(`${YR}-01-01`),td=365;
    h=`<div style="padding:14px"><div style="font-size:12px;font-weight:600;margin-bottom:8px">${YR}년 개강 일정</div><div style="display:flex;margin-bottom:3px">${MOS.map(m=>`<div style="flex:1;font-size:10px;color:#AAA;text-align:center">${m}</div>`).join('')}</div><div style="width:100%;height:20px;background:#EEE;border-radius:3px;position:relative;overflow:hidden;margin-bottom:12px">${bats.map(b=>{const l=Math.max(0,(new Date(b.st)-ys)/864e5/td*100).toFixed(1),w=Math.min(100-parseFloat(l),((new Date(b.en)-new Date(b.st))/864e5+1)/td*100).toFixed(1),ia=new Date(b.st)<=TODAY&&TODAY<=new Date(b.en);return`<div style="position:absolute;top:2px;bottom:2px;border-radius:2px;left:${l}%;width:${w}%;background:${ia?'#378ADD':'#B4B2A9'};cursor:pointer" onclick="sBat('${b.k}')"></div>`;}).join('')}<div style="position:absolute;top:0;bottom:0;width:2px;background:#E24B4A;left:${((TODAY-ys)/864e5/td*100).toFixed(1)}%"></div></div>`+
    bats.map((b,i)=>{const ia=new Date(b.st)<=TODAY&&TODAY<=new Date(b.en),isSel=b.k===dwBk,bF=b.l.reduce((s,r)=>s+calcFee(r,BIZ[curBiz].type),0),days=Math.round((new Date(b.en)-new Date(b.st))/864e5)+1;
      return`<div onclick="sBat('${b.k}')" style="padding:10px 12px;background:${isSel?'#F0F6FF':'#fff'};border:${isSel?'2px solid #185FA5':'1px solid #EBEBEB'};border-left:3px solid ${ia?'#378ADD':'#B4B2A9'};border-radius:10px;margin-bottom:7px;cursor:pointer"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px"><b style="font-size:13px">${BL(b,i,bats.length)} · ${b.st} ~ ${b.en}</b>${ia?'<span class="bdg bon">수강중</span>':'<span class="bdg bof">종료</span>'}</div><div style="display:flex;gap:12px;font-size:12px;color:#888"><span>${b.l.length}명</span><span>${days}일</span><span><b style="color:#185FA5">${W(bF)}</b></span></div></div>`;}).join('')+`</div>`;
  }
  document.getElementById('dwbd').innerHTML=h;
}

updBadge();renderBiz();
</script>
</body>
</html>
