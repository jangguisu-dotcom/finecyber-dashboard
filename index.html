  const label=['자체교육원','사업주환급','법정의무교육','경비직무교육'][biz];
  document.getElementById('pgsub').textContent=`${label} 데이터 로딩 중...`;
  fetch(`${GAS_URL}?biz=${bizKey}`)
    .then(r=>r.json())
    .then(res=>{
      if(!res.ok)throw new Error(res.error||'오류');
      DATA[bizKey]=res.data;
      updBadge();
      document.getElementById('pgsub').textContent=`${label} 업데이트 완료 · ${res.data.length}명 · ${new Date().toLocaleString('ko-KR')}`;
      if(curBiz===biz) renderBiz();
    })
    .catch(err=>{
      document.getElementById('pgsub').textContent=`로드 실패: ${err.message}`;
      alert(`구글 시트 로드 실패!\n${err.message}\n\nLMS 파일 업로드 방식을 사용해주세요.`);
    });
}

function loadAllSheets(){
  document.getElementById('pgsub').textContent='구글 시트에서 전체 데이터 로딩 중...';
  let done=0;
  BIZ_KEYS.forEach(key=>{
    fetch(`${GAS_URL}?biz=${key}`)
      .then(r=>r.json())
      .then(res=>{
        if(res.ok) DATA[key]=res.data;
        done++;
        if(done===BIZ_KEYS.length){
          updBadge();
          document.getElementById('pgsub').textContent=`전체 데이터 로드 완료 · ${new Date().toLocaleString('ko-KR')}`;
          renderBiz();
        }
      })
      .catch(()=>{ done++; });
  });
}

const W=n=>n.toLocaleString('ko-KR')+'원';
const pc=p=>p<30?'#E24B4A':p<55?'#EF9F27':'#639922';
const AG=a=>a.length?Math.round(a.reduce((s,r)=>s+(r.pr||0),0)/a.length):0;
const isOn=r=>{try{return new Date(r.st)<=TODAY&&TODAY<=new Date(r.en)}catch{return false}};
const isFt=r=>{try{return new Date(r.st)>TODAY}catch{return false}};
const isDn=r=>{try{return new Date(r.en)<TODAY}catch{return false}};
const DD=e=>{const d=Math.ceil((new Date(e)-TODAY)/864e5);return d<0?'종료':d<=7?`D-${d}`:`D-${d}`;};
const SB=st=>st==='active'?'<span class="bdg bon">수강중</span>':'<span class="bdg bof">종료</span>';

function calcFee(r,t){
  if(t==='self'){const p=r.pr,s=r.sc||0;return p>=80&&s>=60?190960:p>=50?Math.round(190960*(p/100)*0.8):0;}
  if(t==='legal')return 5000;
  if(t==='guard')return(r.sessions||[]).filter(s=>s===1).length*1000;
  return 0;
}
function feeLabel(r,t){
  if(t==='self'){const p=r.pr,s=r.sc||0;if(p>=80&&s>=60)return{l:'100% 지급',c:'b10'};if(p>=80&&s<60)return{l:'80% (평가미달)',c:'b80'};if(p>=50)return{l:'80% (진도)',c:'b80'};return{l:'미지급',c:'bno'};}
  if(t==='legal')return{l:'개강 확정',c:'b10'};
  if(t==='guard'){const cnt=(r.sessions||[]).filter(s=>s===1).length;return{l:`${cnt}회 수강`,c:'b10'};}
  return{l:'-',c:'bof'};
}
const getArr=()=>curBiz===0?DATA.self:curBiz===1?DATA.refund:curBiz===2?DATA.legal:DATA.guard;
const getCos=()=>{const m={};getArr().forEach(r=>{if(!m[r.co])m[r.co]={name:r.co,l:[]};m[r.co].l.push(r)});return Object.values(m);};
const BAT=ls=>{const m={};ls.forEach(r=>{const k=(r.st||'')+'_'+(r.en||'');if(!m[k])m[k]={k,st:r.st,en:r.en,l:[]};m[k].l.push(r)});return Object.values(m).sort((a,b)=>new Date(b.st||0)-new Date(a.st||0));};
const BL=(b,i,t)=>`${t-i}기 (${(b.st||'').slice(0,7).replace('-','년 ')}월)`;
const CST=ls=>ls.some(r=>isOn(r))?'active':'done';

function updBadge(){
  document.getElementById('ubdg').textContent=DATA.self.filter(r=>isOn(r)&&r.pr<50).length+DATA.refund.filter(r=>isOn(r)&&r.pr<50).length;
}
function goSB(pg,el){
  document.querySelectorAll('.sbi').forEach(i=>i.classList.remove('on'));

  curPage=pg;cldw();
  document.getElementById('pgtit').textContent={overview:'전체 현황',fee:'수수료 정산',urgent:'독려 대상',upload:'LMS 파일 업로드'}[pg]||pg;
  if(pg==='overview')renderBiz();

function setBiz(idx,el){

// 데이터에서 연도 목록 추출
function getYears(){
  const arr=getArr();
  const ys=new Set();
  arr.forEach(r=>{
    if(r.st) ys.add(new Date(r.st).getFullYear());
    if(r.en) ys.add(new Date(r.en).getFullYear());
  });
  ys.add(TODAY.getFullYear());
  return [...ys].sort();
}

function handleFile(input,bizIdx){
  const f=input.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'array',cellDates:true});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const json=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      if(json.length<2){alert('데이터가 없어요.');return;}
      const hdr=json[0].map(h=>String(h).trim());
      const rows=json.slice(1).filter(r=>r.some(c=>c!==''));
      const biz=BIZ[bizIdx];
      const find=(keys)=>hdr.findIndex(h=>keys.some(k=>h.toLowerCase().includes(k.toLowerCase())));

      // LMS 컬럼 자동 감지 (사업주, 이름 등 실제 LMS 컬럼명 우선)
      const ci=find(['사업주','고객사','업체','회사']);
      const ni=find(['이름','수강생','성명']);
      const pi=find(['진도율','진도','진행','완료율']);
      const si=find(['총점','최종평가','평가점수','점수']);
      const li=find(['첨삭완료','마지막접속','접속','로그인','수강신청일']);
      const periodi=find(['수강기간']); // 수강기간 컬럼 (2026-05-13~2026-06-12)
      const sti=find(['개강일','시작일','수강시작']);
      const ei=find(['종강일','종료일','마감일','수강종료']);

      if(ci<0||ni<0){alert('고객사명(사업주), 수강생명(이름) 컬럼을 찾지 못했어요.\n현재 컬럼: '+hdr.slice(0,10).join(', '));return;}

      function pDate(v){
        if(!v||v==='0000-00-00 00:00:00'||v==='NaT')return'';
        if(v instanceof Date&&!isNaN(v)){return`${v.getFullYear()}-${String(v.getMonth()+1).padStart(2,'0')}-${String(v.getDate()).padStart(2,'0')}`;}
        const s=String(v).trim();
        if(!s||s==='NaN')return'';
        const m=s.match(/(\d{4})[.\-\/](\d{1,2})[.\-\/](\d{1,2})/);
        return m?`${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`:s;
      }

      function parsePeriod(v){
        // 수강기간: "2026-05-13~2026-06-12" 형식 파싱
        const s=String(v||'').trim();
        const m=s.match(/(\d{4}-\d{2}-\d{2})~(\d{4}-\d{2}-\d{2})/);
        if(m)return{st:m[1],en:m[2]};
        return{st:'',en:''};
      }

      function parseProgress(v){
        // 진도율: 0.9 → 90, 90 → 90, 90% → 90
        let n=parseFloat(String(v).replace('%',''))||0;
        if(n>0&&n<=1) n=Math.round(n*100); // 0~1 소수 → 백분율
        return Math.min(100,Math.max(0,Math.round(n)));
      }

      function parseLastLogin(v){
        const s=pDate(v);
        if(!s)return'-';
        const d=Math.floor((TODAY-new Date(s))/864e5);
        if(d===0)return'오늘';
        if(d===1)return'어제';
        if(d<0)return'-';
        return`${d}일 전`;
      }

      let parsed;
      if(biz.type==='guard'){
        parsed=rows.map(r=>({
          co:String(r[ci]||'').trim(),
          nm:String(r[ni]||'').trim(),
          ll:li>=0?parseLastLogin(r[li]):'-',
          st:`${curYear}-01-01`,en:`${curYear}-12-31`,
          sessions:Array(12).fill(0).map((_,mi)=>{
            const idx=hdr.findIndex(h=>[`${mi+1}월`,MOS[mi]].some(k=>h.includes(k)));
            return idx>=0?parseInt(r[idx])||0:0;
          })
        }));
      } else {
        parsed=rows.map(r=>{
          // 수강기간 컬럼에서 개강일/종강일 파싱
          let st='',en='';
          if(periodi>=0&&r[periodi]){
            const p=parsePeriod(r[periodi]);
            st=p.st;en=p.en;
          }
          if(!st&&sti>=0) st=pDate(r[sti]);
          if(!en&&ei>=0) en=pDate(r[ei]);

          return{
            co:String(r[ci]||'').trim(),
            nm:String(r[ni]||'').trim(),
            pr:pi>=0?parseProgress(r[pi]):0,
            sc:si>=0?parseFloat(String(r[si]).replace('%',''))||0:0,
            ll:li>=0?parseLastLogin(r[li]):'-',
            st,en,
            type:hdr.findIndex(h=>h.includes('유형'))>=0?
              String(r[hdr.findIndex(h=>h.includes('유형'))]||'기타법정').trim():'기타법정'
          };
        });
      }

      parsed=parsed.filter(r=>r.co&&r.nm);
      if(!parsed.length){alert('데이터를 읽지 못했어요.\n고객사명·수강생명이 비어있는지 확인해주세요.');return;}

      const keys=['self','refund','legal','guard'];
      DATA[keys[bizIdx]]=parsed;
      document.getElementById('pgsub').textContent=`${biz.name} 업데이트: ${new Date().toLocaleString('ko-KR')} · ${parsed.length}명 로드됨`;
      updBadge();
      curBiz=bizIdx;
      document.querySelectorAll('.biz-tab').forEach((t,i)=>t.classList.toggle('on',i===bizIdx));
      curPage='overview';
      document.getElementById('pgtit').textContent='전체 현황';
      document.querySelectorAll('.sbi').forEach(i=>i.classList.remove('on'));
      document.getElementById('ndb').classList.add('on');
      renderBiz();
      alert(`✅ ${biz.name} 데이터 로드 완료!\n총 ${parsed.length}명 · ${[...new Set(parsed.map(r=>r.co))].length}개 고객사`);
    }catch(err){alert('파일 처리 중 오류: '+err.message);}
  };
  r.readAsArrayBuffer(f);
}

function odw(name){
  dwCo=name;
  const biz=BIZ[curBiz],cos=getCos(),co=cos.find(c=>c.name===name);if(!co)return;
  if(biz.type==='self'||biz.type==='refund'){const bats=BAT(co.l),aB=bats.find(b=>new Date(b.st)<=TODAY&&TODAY<=new Date(b.en));dwBk=aB?aB.k:bats[0]?.k;rBS(bats);}else{document.getElementById('dwbat').innerHTML='';dwBk=null;}
  document.getElementById('dwtit').innerHTML=name+' '+SB(biz.type==='guard'?'active':CST(co.l));
  rPil(co);rSum(co);rDwTabs(biz);rDwBd(co);
  document.getElementById('dw').classList.add('on');document.getElementById('ov').classList.add('on');
  document.querySelectorAll('.cc').forEach(el=>el.classList.toggle('sel',(el.getAttribute('onclick')||'').includes(`'${name}'`)));
}
function cldw(){document.getElementById('dw').classList.remove('on');document.getElementById('ov').classList.remove('on');document.querySelectorAll('.cc').forEach(el=>el.classList.remove('sel'));dwCo=null;}
function rBS(bats){document.getElementById('dwbat').innerHTML=`<span style="font-size:11px;color:#888;flex-shrink:0">기수 선택</span>`+bats.map((b,i)=>{const ia=new Date(b.st)<=TODAY&&TODAY<=new Date(b.en);return`<button class="bbt ${b.k===dwBk?'on':''}" onclick="sBat('${b.k}')">${BL(b,i,bats.length)}${ia?' ●':''}</button>`;}).join('');}
function sBat(k){dwBk=k;const cos=getCos(),co=cos.find(c=>c.name===dwCo);if(!co)return;rBS(BAT(co.l));rPil(co);rSum(co);rDwBd(co);}
function gCL(co){if(!dwBk)return co.l;return(BAT(co.l).find(x=>x.k===dwBk)||{l:[]}).l;}

function rPil(co){
  const biz=BIZ[curBiz],ls=gCL(co),tot=ls.reduce((s,r)=>s+calcFee(r,biz.type),0);
  const allStP=co.l.map(r=>r.st).filter(Boolean).sort();
  const firstStP=allStP[0]||'';
  const activeStP=co.l.find(r=>isOn(r))?.st||'';
  const openInfo=activeStP?`개강 ${activeStP.slice(0,10)} (수강중)`:firstStP?`최근 개강 ${firstStP.slice(0,10)}`:'';
  document.getElementById('dwmet').textContent=`${openInfo}${openInfo?' · ':''}수강생 ${ls.length}명 · 예상 수수료 ${W(tot)}`;
  if(biz.type==='self'||biz.type==='refund'){
    const f1=ls.filter(r=>r.pr>=80&&(r.sc||0)>=60).length,f8=ls.filter(r=>(r.pr>=50&&r.pr<80)||(r.pr>=80&&(r.sc||0)<60)).length,f0=ls.filter(r=>r.pr<50).length;
    const ep=ls.filter(r=>(r.sc||0)>=60).length,et=ls.filter(r=>(r.sc||0)>0).length;
    document.getElementById('dwpil').innerHTML=`<span class="pil" style="background:#EAF3DE;color:#3B6D11">100% ${f1}명</span><span class="pil" style="background:#FAEEDA;color:#633806">80% ${f8}명</span><span class="pil" style="background:#FCEBEB;color:#791F1F">미지급 ${f0}명</span><span class="pil" style="background:#E6F1FB;color:#0C447C">${W(tot)}</span><span class="pil" style="background:#F3EBFF;color:#5B21B6">평가 60점↑ ${ep}명 / ${et}명</span>`;
  }
  else if(biz.type==='legal'){const done=ls.filter(r=>r.pr>=100).length,ep2=ls.filter(r=>(r.sc||0)>=60).length,et2=ls.filter(r=>(r.sc||0)>0).length;document.getElementById('dwpil').innerHTML=`<span class="pil" style="background:#EAF3DE;color:#3B6D11">완료 ${done}명</span><span class="pil" style="background:#FAEEDA;color:#633806">미완료 ${ls.length-done}명</span><span class="pil" style="background:#E6F1FB;color:#0C447C">${W(tot)}</span><span class="pil" style="background:#F3EBFF;color:#5B21B6">평가 60점↑ ${ep2}명 / ${et2}명</span>`;}
  else{const ts=ls.reduce((s,r)=>s+(r.sessions||[]).filter(x=>x===1).length,0);document.getElementById('dwpil').innerHTML=`<span class="pil" style="background:#EAF3DE;color:#3B6D11">누적 ${ts}회 출석</span><span class="pil" style="background:#E6F1FB;color:#0C447C">${W(tot)}</span>`;}
}

  } else if(biz.type==='legal'){

  } else {

  if(dwTab==='learners'){
    h=`<table><thead><tr><th style="width:20%">수강생</th><th style="width:25%">진도율</th><th style="width:12%">평가</th><th style="width:16%">마지막접속</th><th style="width:10%">D-day</th><th style="width:17%">상태</th></tr></thead><tbody>`+
    [...ls].sort((a,b)=>a.pr-b.pr).map(r=>{const ft=feeLabel(r,biz.type);return`<tr><td><b>${r.nm}</b></td><td><span class="pb"><span class="pf" style="width:${r.pr}%;background:${pc(r.pr)}"></span></span> <b style="color:${pc(r.pr)}">${r.pr}%</b></td><td style="color:${(r.sc||0)>=60?'#3B6D11':(r.sc||0)>0?'#A32D2D':'#CCC'}">${(r.sc||0)>0?r.sc+'점':'미응시'}</td><td style="color:#888">${r.ll}</td><td style="font-size:11px">${r.en?DD(r.en):'-'}</td><td><span class="bdg ${ft.c}">${ft.l}</span></td></tr>`;}).join('')+`</tbody></table>`;
  } else if(dwTab==='fee'){
    const tot=ls.reduce((s,r)=>s+calcFee(r,biz.type),0);
    h=`<div style="padding:9px 13px;background:#FAFAFA;border-bottom:1px solid #EBEBEB;font-size:11px;color:#888">${biz.type==='legal'?`개강 기준 · ${W(biz.unit)}/인·회`:biz.type==='guard'?`출석 기준 · ${W(biz.unit)}/인·회`:`단가 ${W(biz.unit)}/인`} · 합계 <b style="color:#185FA5">${W(tot)}</b></div>
    <table><thead><tr><th style="width:25%">수강생</th>${biz.type==='guard'?'<th>출석 회차</th><th>수수료</th>':'<th style="width:22%">진도율</th><th>평가</th><th>수수료</th><th>유형</th>'}</tr></thead><tbody>`+
    ls.map(r=>{const f=calcFee(r,biz.type),ft=feeLabel(r,biz.type);
      if(biz.type==='guard'){const cnt=(r.sessions||[]).filter(x=>x===1).length;return`<tr><td><b>${r.nm}</b></td><td style="color:#888">${cnt}회 / 12회</td><td style="font-weight:600;color:#185FA5">${W(f)}</td></tr>`;}
      return`<tr><td><b>${r.nm}</b></td><td><span class="pb"><span class="pf" style="width:${r.pr}%;background:${pc(r.pr)}"></span></span> <b style="color:${pc(r.pr)}">${r.pr}%</b></td><td style="color:${(r.sc||0)>=60?'#3B6D11':(r.sc||0)>0?'#A32D2D':'#CCC'}">${(r.sc||0)>0?r.sc+'점':'미응시'}</td><td style="font-weight:600;color:#185FA5">${W(f)}</td><td><span class="bdg ${ft.c}">${ft.l}</span></td></tr>`;}).join('')+
    `</tbody><tfoot><tr><td colspan="${biz.type==='guard'?2:4}">합계</td><td style="color:#185FA5">${W(tot)}</td>${biz.type==='guard'?'':'<td></td>'}</tr></tfoot></table>`;
  } else if(dwTab==='attendance'){
    h=`<div style="overflow-x:auto"><table><thead><tr><th style="min-width:90px">수강생</th>${MOS.map(m=>`<th style="width:50px;text-align:center">${m}</th>`).join('')}<th style="text-align:center">합계</th></tr></thead><tbody>`+
    ls.map(r=>{const cnt=(r.sessions||[]).filter(x=>x===1).length;return`<tr><td><b>${r.nm}</b></td>${(r.sessions||Array(12).fill(0)).map((s,i)=>`<td style="text-align:center;color:${s===1?'#3B6D11':i<=TODAY.getMonth()?'#CCC':'#EEE'};font-size:16px">${s===1?'●':'○'}</td>`).join('')}<td style="text-align:center;font-weight:600;color:#639922">${cnt}회</td></tr>`;}).join('')+
    `</tbody><tfoot><tr><td>합계</td>${Array(12).fill(0).map((_,mi)=>`<td style="text-align:center;color:#639922;font-weight:600">${ls.filter(r=>(r.sessions||[])[mi]===1).length}</td>`).join('')}<td style="text-align:center;font-weight:600;color:#639922">${ls.reduce((s,r)=>s+(r.sessions||[]).filter(x=>x===1).length,0)}</td></tr></tfoot></table></div>`;
  } else if(dwTab==='schedule'){
    const bats=BAT(co.l);const ys=new Date(`${YR}-01-01`),td=365;
    h=`<div style="padding:14px"><div style="font-size:11px;font-weight:600;margin-bottom:8px">${YR}년 개강 일정</div><div style="display:flex;margin-bottom:3px">${MOS.map(m=>`<div style="flex:1;font-size:9px;color:#AAA;text-align:center">${m}</div>`).join('')}</div><div style="width:100%;height:20px;background:#EEE;border-radius:3px;position:relative;overflow:hidden;margin-bottom:12px">${bats.map(b=>{const l=Math.max(0,(new Date(b.st)-ys)/864e5/td*100).toFixed(1),w=Math.min(100-parseFloat(l),((new Date(b.en)-new Date(b.st))/864e5+1)/td*100).toFixed(1),ia=new Date(b.st)<=TODAY&&TODAY<=new Date(b.en);return`<div style="position:absolute;top:2px;bottom:2px;border-radius:2px;left:${l}%;width:${w}%;background:${ia?'#378ADD':'#B4B2A9'};cursor:pointer" onclick="sBat('${b.k}')"></div>`;}).join('')}<div style="position:absolute;top:0;bottom:0;width:2px;background:#E24B4A;left:${((TODAY-ys)/864e5/td*100).toFixed(1)}%"></div></div>`+
    bats.map((b,i)=>{const ia=new Date(b.st)<=TODAY&&TODAY<=new Date(b.en),isSel=b.k===dwBk,bF=b.l.reduce((s,r)=>s+calcFee(r,BIZ[curBiz].type),0),days=Math.round((new Date(b.en)-new Date(b.st))/864e5)+1;
      return`<div onclick="sBat('${b.k}')" style="padding:10px 12px;background:${isSel?'#F0F6FF':'#fff'};border:${isSel?'2px solid #185FA5':'1px solid #EBEBEB'};border-left:3px solid ${ia?'#378ADD':'#B4B2A9'};border-radius:10px;margin-bottom:7px;cursor:pointer"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px"><b style="font-size:12px">${BL(b,i,bats.length)} · ${b.st} ~ ${b.en}</b>${ia?'<span class="bdg bon">수강중</span>':'<span class="bdg bof">종료</span>'}</div><div style="display:flex;gap:12px;font-size:11px;color:#888"><span>${b.l.length}명</span><span>${days}일</span><span><b style="color:#185FA5">${W(bF)}</b></span></div></div>`;}).join('')+`</div>`;
  }
  document.getElementById('dwbd').innerHTML=h;
}

updBadge();renderBiz();
</script>
